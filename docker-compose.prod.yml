version: '3.8'

services:
  db:
    image: postgres:17-alpine
    env_file:
      - .env.prod
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    command: >
      postgres 
      -c shared_preload_libraries=pg_stat_statements 
      -c pg_stat_statements.track=all
      -c max_connections=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data_prod:/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    command: >
      gunicorn 
      --bind 0.0.0.0:8000 
      --workers 4 
      --worker-class gthread 
      --worker-tmp-dir /dev/shm 
      --log-level info 
      --access-logfile - 
      --error-logfile - 
      --timeout 120 
      --keep-alive 5 
      config.wsgi:application
    volumes:
      - static_volume:/app/autodealer_backend/static
      - media_volume:/app/autodealer_backend/media
      - ./logs:/app/logs
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings_prod
      - PYTHONPATH=/app
    env_file:
      - .env.prod
    expose:
      - 8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - static_volume:/app/autodealer_backend/static:ro
      - media_volume:/app/autodealer_backend/media:ro
      - ./nginx/logs:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    restart: unless-stopped

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.prod
    command: >
      celery -A autodealer_backend.celery_app worker 
      --queues=periodic_tasks,maintenance_tasks,default 
      --loglevel=info 
      --concurrency=4 
      --max-tasks-per-child=1000 
      --logfile=/app/logs/celery_worker.log
    volumes:
      - ./logs:/app/logs
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings_prod
      - PYTHONPATH=/app
    env_file:
      - .env.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.prod
    command: >
      celery -A autodealer_backend.celery_app beat 
      --loglevel=info 
      --schedule=/app/celerybeat-schedule 
      --pidfile=/tmp/celerybeat.pid
    volumes:
      - ./logs:/app/logs
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings_prod
      - PYTHONPATH=/app
    env_file:
      - .env.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  flower:
    build:
      context: .
      dockerfile: Dockerfile.prod
    command: >
      sh -c "pip install flower && 
      celery -A autodealer_backend.celery_app flower 
      --port=5555 
      --basic_auth=admin:$$FLOWER_PASSWORD"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings_prod
      - PYTHONPATH=/app
    env_file:
      - .env.prod
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery-worker
    restart: unless-stopped

volumes:
  postgres_data_prod:
  redis_data_prod:
  static_volume:
  media_volume: